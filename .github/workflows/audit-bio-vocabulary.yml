name: Audit FigureLoom Bio language and combinations

on:
  pull_request:
    paths:
      - 'figureloom-bio/**'
      - 'scripts/generate-bio-command-reference.py'
      - 'wiki/FigureLoom-Bio-Command-Reference.md'
      - '.github/workflows/audit-bio-vocabulary.yml'
  push:
    branches: [main]
    paths:
      - 'figureloom-bio/**'
      - 'scripts/generate-bio-command-reference.py'
      - 'wiki/FigureLoom-Bio-Command-Reference.md'
      - '.github/workflows/audit-bio-vocabulary.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  language_matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Execute every sentence and compatible program combination
        id: audit
        shell: bash
        run: |
          set +e
          cd figureloom-bio
          python3 -m unittest \
            tests.test_every_language_sentence_executes \
            tests.test_language_program_combinations \
            -v 2>&1 | tee "$RUNNER_TEMP/figureloom-bio-language-and-combination-audit.txt"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Generate complete command reference
        run: python3 scripts/generate-bio-command-reference.py --output "$RUNNER_TEMP/FigureLoom-Bio-Command-Reference.md"

      - name: Upload language, combination, and reference evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: FigureLoom-Bio-Language-and-Combination-Audit
          path: |
            ${{ runner.temp }}/figureloom-bio-language-and-combination-audit.txt
            ${{ runner.temp }}/FigureLoom-Bio-Command-Reference.md
          if-no-files-found: error

      - name: Fail when a sentence or compatible combination did not execute
        if: steps.audit.outputs.status != '0'
        run: exit 1
