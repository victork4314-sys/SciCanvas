name: Test rendered-preview PowerPoint package

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Check JavaScript syntax
        run: node --check pptx-thumbnail-source-export.js && node --check tests/pptx-preview-source.spec.js
      - name: Install test dependencies
        run: npm install --no-audit --no-fund
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run actual preview-source PowerPoint test
        run: npx playwright test tests/pptx-preview-source.spec.js --project=desktop
      - name: Upload generated PowerPoint and traces
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: thumbnail-source-pptx-results
          path: test-results
          if-no-files-found: warn