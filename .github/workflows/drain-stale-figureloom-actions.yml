name: Drain stale FigureLoom repair Actions runs
# Restricted same-repository queue-drain trigger.

on:
  pull_request:
    paths:
      - '.github/workflows/drain-stale-figureloom-actions.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/drain-stale-figureloom-actions.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: drain-stale-figureloom-actions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drain:
    if: github.event_name != 'pull_request' || (github.actor == 'victork4314-sys' && github.head_ref == 'rescue/drain-actions-queue')
    strategy:
      fail-fast: false
      matrix:
        runner:
          - windows-latest
          - ubuntu-24.04
          - ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    steps:
      - name: Force-cancel the explicitly known stale FigureLoom runs
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Continue'
          $repository = $env:GITHUB_REPOSITORY
          $currentRun = [long]$env:GITHUB_RUN_ID
          $protected = [System.Collections.Generic.HashSet[long]]::new()
          [void]$protected.Add(30056199791) # Current four-pool macOS build/test/publish run.
          [void]$protected.Add(30056632823) # Current separate macOS 14 Apple Silicon run.
          [void]$protected.Add($currentRun)

          $knownStale = @(
            30053143137, 30053143154, 30053143158, 30053143147,
            30053799205, 30053799247, 30053799251, 30053799276, 30053799284, 30053799274,
            30054188887, 30054188912, 30054188927, 30054188919, 30054188921, 30054188893,
            30054512334, 30054512345, 30054512336, 30054512335, 30054512392, 30054512354,
            30055370222, 30055445423, 30055563438, 30055834225,
            30056085423, 30056085445, 30056085421,
            30056199798, 30056199792,
            30056632757, 30056632761,
            30058217498
          )

          $cancelled = 0
          foreach ($id in $knownStale) {
            if ($protected.Contains([long]$id)) { continue }
            $run = gh api "repos/$repository/actions/runs/$id" 2>$null | ConvertFrom-Json
            if ($LASTEXITCODE -ne 0 -or -not $run) {
              Write-Host "$id is unavailable; skipping."
              continue
            }
            Write-Host "$id before cancellation: status=$($run.status), conclusion=$($run.conclusion), name=$($run.name), branch=$($run.head_branch)"
            if ($run.status -eq 'completed') { continue }

            gh api --method POST "repos/$repository/actions/runs/$id/cancel" *> $null
            if ($LASTEXITCODE -ne 0) {
              gh api --method POST "repos/$repository/actions/runs/$id/force-cancel" *> $null
            }
            if ($LASTEXITCODE -eq 0) {
              $cancelled += 1
              Write-Host "Cancellation accepted for $id."
            } else {
              Write-Warning "GitHub refused both cancellation endpoints for $id."
            }
          }

          Start-Sleep -Seconds 8
          Write-Host "Cancellation requests accepted: $cancelled"
          foreach ($id in $knownStale) {
            if ($protected.Contains([long]$id)) { continue }
            $run = gh api "repos/$repository/actions/runs/$id" 2>$null | ConvertFrom-Json
            if ($LASTEXITCODE -eq 0 -and $run) {
              Write-Host "$id after cancellation: status=$($run.status), conclusion=$($run.conclusion)"
            }
          }
