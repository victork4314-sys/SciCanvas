name: Focused runtime smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: figureloom-runtime-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install test dependency
        run: npm install --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Check focused test syntax
        run: node --check tests/runtime-console.spec.js

      - name: Run light and dark desktop and phone checks
        run: npx playwright test tests/runtime-console.spec.js --project=desktop --project=mobile

      - name: Upload failure details
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: focused-runtime-failure
          path: test-results
          if-no-files-found: ignore
