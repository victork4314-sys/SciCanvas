name: Verify published FigureLoom Bio macOS installers

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-published-macos-installers.yml'
      - '.github/scripts/test-installed-macos-package.sh'
  pull_request:
    paths:
      - '.github/validation/run-published-macos-check'
  workflow_dispatch:
  issues:
    types: [edited]

permissions:
  contents: read
  issues: write

concurrency:
  group: verify-published-figureloom-bio-macos-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  apple_silicon:
    if: github.event_name != 'issues' || github.event.issue.number == 226
    name: Verify published Apple Silicon installer
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Report Apple Silicon validation start
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment 226 --repo "$GITHUB_REPOSITORY" --body "Apple Silicon exact-release validation started. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Checkout validation script
        uses: actions/checkout@v6

      - name: Download exact published Apple Silicon package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release
          gh release download figureloom-bio-macos-installer \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'FigureLoom-Bio-Installer-macOS-Apple-Silicon.pkg' \
            --dir release \
            --clobber
          test -s release/FigureLoom-Bio-Installer-macOS-Apple-Silicon.pkg
          test "$(head -c 4 release/FigureLoom-Bio-Installer-macOS-Apple-Silicon.pkg)" = 'xar!'

      - name: Install and test the exact published Apple Silicon package
        env:
          PACKAGE: release/FigureLoom-Bio-Installer-macOS-Apple-Silicon.pkg
          EXPECTED_ARCH: arm64
          TEST_ROOT: ${{ runner.temp }}/published-figureloom-bio-apple-test
        run: bash .github/scripts/test-installed-macos-package.sh

      - name: Report Apple Silicon validation result
        if: always() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ job.status }}
        run: gh issue comment 226 --repo "$GITHUB_REPOSITORY" --body "Apple Silicon exact-release validation: **$RESULT**. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

  intel:
    if: github.event_name != 'issues' || github.event.issue.number == 226
    name: Verify published Intel installer
    runs-on: macos-15-intel
    timeout-minutes: 30
    steps:
      - name: Report Intel validation start
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment 226 --repo "$GITHUB_REPOSITORY" --body "Intel exact-release validation started. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Checkout validation script
        uses: actions/checkout@v6

      - name: Download exact published Intel package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release
          gh release download figureloom-bio-macos-installer \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'FigureLoom-Bio-Installer-macOS-Intel.pkg' \
            --dir release \
            --clobber
          test -s release/FigureLoom-Bio-Installer-macOS-Intel.pkg
          test "$(head -c 4 release/FigureLoom-Bio-Installer-macOS-Intel.pkg)" = 'xar!'

      - name: Install and test the exact published Intel package
        env:
          PACKAGE: release/FigureLoom-Bio-Installer-macOS-Intel.pkg
          EXPECTED_ARCH: x86_64
          TEST_ROOT: ${{ runner.temp }}/published-figureloom-bio-intel-test
        run: bash .github/scripts/test-installed-macos-package.sh

      - name: Report Intel validation result
        if: always() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ job.status }}
        run: gh issue comment 226 --repo "$GITHUB_REPOSITORY" --body "Intel exact-release validation: **$RESULT**. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
