name: Validate FigureLoom

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  syntax:
    if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'rescue/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check JavaScript syntax
        run: |
          for file in *.js; do
            echo "Checking $file"
            node --check "$file"
          done
          for file in ide/*.js; do
            echo "Checking $file"
            node --check "$file"
          done
          node --check wiki/wiki.js
          node --check scripts/validate-help-center.mjs
          node --check scripts/validate-wiki.mjs
          node --check tests/smoke.spec.js
          node --check tests/help-center-theme.spec.js
          node --check tests/today-ui-stability.spec.js
          node --check tests/final-session-polish.spec.js
          node --check tests/runtime-console.spec.js
          node --check final-session-core.js
          node --check final-session-polish-v2.js
          node --check mcp-current-screenshot.js

      - name: Run FigureLoom Bio tests
        run: |
          set -o pipefail
          cd figureloom-bio
          python3 -m unittest discover -s tests -v 2>&1 | tee "$GITHUB_WORKSPACE/figureloom-bio-unit-tests.log"

      - name: Upload complete FigureLoom Bio unittest trace
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: FigureLoom-Bio-Unittest-Trace
          path: figureloom-bio-unit-tests.log
          if-no-files-found: warn

      - name: Check required application files
        run: |
          test -f index.html
          test -f styles.css
          test -f figureloom-mark.svg
          test -f app.js
          test -f science-library.js
          test -f water-icons.js
          test -f science-vocabulary.js
          test -f library-dedup.js
          test -f project-tools.js
          test -f pro-tools-hub.js
          test -f advanced-tools.js
          test -f design-tools.js
          test -f export-tools.js
          test -f storage-vault.js
          test -f font-library.js
          test -f interaction-tools.js
          test -f resize-tools.js
          test -f layer-drag.js
          test -f asset-vault.js
          test -f editable-svg-import.js
          test -f export-svg-placement.js
          test -f external-packs.js
          test -f expanded-library.js
          test -f fun-design-tools.js
