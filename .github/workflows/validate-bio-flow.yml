name: Validate FigureLoom Bio flow

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bio_flow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check browser JavaScript syntax
        run: |
          node --check ide/ide-control-flow-runtime.js
          node --check ide/ide-decisions.js
          node --check ide/ide-addon-runtime.js
          node --check ide/ide-decision-core.js
          node --check ide/ide-current-file-language.js
          node --check ide/ide-language-manifest.js
          node --check ide/ide-language-catalog-ui.js
          node --check ide/ide-language-blocks-ui.js
          node --check ide/ide-translator.js
          node --check ide/ide-approved-common.js
          node --check ide/ide-addon-packages.js
          node --check ide/ide-builtin-language-support.js
          node --check scripts/validate-bio-control-flow.mjs
          node --check scripts/validate-bio-browser-example.mjs
          node --check scripts/validate-bio-current-file.mjs
          node --check scripts/validate-bio-current-file-runtime.mjs
          node --check scripts/validate-bio-language-manifest.mjs
          node --check scripts/validate-bio-translator.mjs
          node --check scripts/validate-bio-decision-core.mjs
          node --check scripts/validate-bio-runtime-race.mjs

      - name: Validate shared language manifest
        run: node scripts/validate-bio-language-manifest.mjs

      - name: Validate current-file sentences
        run: node scripts/validate-bio-current-file.mjs

      - name: Run current-file sentences through the real browser runtime
        run: node scripts/validate-bio-current-file-runtime.mjs

      - name: Validate browser translation targets and block punctuation
        run: node scripts/validate-bio-translator.mjs

      - name: Validate exact decision words
        run: node scripts/validate-bio-decision-core.mjs

      - name: Validate browser control flow
        run: node scripts/validate-bio-control-flow.mjs

      - name: Run bundled microbiology example
        run: node scripts/validate-bio-browser-example.mjs

      - name: Recognize decisions before runtime loading
        run: node scripts/validate-bio-runtime-race.mjs recognition

      - name: Hold program while runtime loads
        run: node scripts/validate-bio-runtime-race.mjs waiting

      - name: Load and claim the program
        run: node scripts/validate-bio-runtime-race.mjs runtime-ready

      - name: Retry Run into the complete runtime
        run: node scripts/validate-bio-runtime-race.mjs retried

      - name: Leave the loading status
        run: node scripts/validate-bio-runtime-race.mjs left-waiting

      - name: Run control flow tests
        run: |
          cd figureloom-bio
          python3 -m unittest discover -s tests -p 'test_control_flow.py' -v

      - name: Run complete FigureLoom Bio tests
        run: |
          cd figureloom-bio
          python3 -m unittest discover -s tests -v
