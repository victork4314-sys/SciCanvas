name: Stability smoke

on:
  push:
    branches:
      - main
      - fix/help-tabs-guide-debug-20260720
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  desktop-and-phone:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check changed JavaScript syntax
        run: |
          node --check help-center.js
          node --check tests/today-stability.spec.js

      - name: Install browser test dependencies
        run: npm install --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run targeted desktop and phone checks
        run: npx playwright test tests/today-stability.spec.js --project=desktop --project=mobile

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: stability-smoke-results
          path: test-results
          if-no-files-found: warn
