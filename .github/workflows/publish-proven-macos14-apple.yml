name: Publish proven FigureLoom Bio Apple Silicon package on macOS 14

on:
  pull_request:
    paths:
      - '.github/workflows/publish-proven-macos14-apple.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-proven-macos14-apple.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: publish-proven-figureloom-bio-macos14-apple-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_test_publish:
    if: github.event_name != 'pull_request' || (github.actor == 'victork4314-sys' && github.head_ref == 'rescue/publish-proven-macos14-apple')
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - name: Checkout trusted repository state
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build, install-test, publish, and verify Apple Silicon package
        env:
          GH_TOKEN: ${{ github.token }}
          FIGURELOOM_MAC_ARCH_LABEL: arm64
          FIGURELOOM_MAC_PACKAGE_NAME: FigureLoom-Bio-Installer-macOS-Apple-Silicon.pkg
          FIGURELOOM_MAC_TEST_FOLDER: figureloom-bio-macos-arm-14-rescue-test
        run: bash .github/rescue/build-test-publish-macos.sh

      - name: Upload macOS 14 install traces
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: FigureLoom-Bio-macOS-14-Apple-Silicon-Install-Trace
          path: |
            ${{ runner.temp }}/arm64-install-test.log
            ${{ runner.temp }}/arm64-system-installer.log
          if-no-files-found: warn

      - name: Upload tested Apple Silicon package backup
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: FigureLoom-Bio-macOS-14-Apple-Silicon-Package
          path: dist/FigureLoom-Bio-Installer-macOS-Apple-Silicon.pkg
          if-no-files-found: error
