name: Report FigureLoom Bio release status

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/report-bio-release-status.yml'
  workflow_dispatch:

permissions:
  actions: read
  issues: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Report newest independent Mac publisher
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow publish-fixed-macos-installers.yml \
            --branch main \
            --limit 5 \
            --json databaseId,status,conclusion,headSha,event,number,createdAt,updatedAt,url,workflowName \
            > /tmp/runs.json
          latest="$(jq -r '.[0].databaseId // empty' /tmp/runs.json)"
          if [[ -n "$latest" ]]; then
            gh run view "$latest" \
              --repo "$GITHUB_REPOSITORY" \
              --json databaseId,status,conclusion,headSha,event,createdAt,updatedAt,url,jobs \
              > /tmp/latest.json
          else
            printf '{}\n' > /tmp/latest.json
          fi
          {
            echo 'Newest independent Mac publisher:'
            echo '```json'
            cat /tmp/runs.json
            echo '```'
            echo
            echo 'Newest run jobs:'
            echo '```json'
            cat /tmp/latest.json
            echo '```'
          } > /tmp/status.md
          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/issues/comments/5069780966" \
            -f "body=$(cat /tmp/status.md)"

