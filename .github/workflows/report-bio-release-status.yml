name: Report FigureLoom Bio release status

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/report-bio-release-status.yml'
  workflow_dispatch:

permissions:
  actions: write
  issues: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Report current Intel proof failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id=30096168050
          intel_job=89490644653
          gh run view "$run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId,status,conclusion,headSha,createdAt,updatedAt,url,jobs \
            > /tmp/run.json
          gh api "repos/$GITHUB_REPOSITORY/actions/jobs/$intel_job/logs" > /tmp/intel.bin
          if unzip -t /tmp/intel.bin >/dev/null 2>&1; then
            unzip -p /tmp/intel.bin > /tmp/intel.log
          else
            cp /tmp/intel.bin /tmp/intel.log
          fi
          tail -n 90 /tmp/intel.log > /tmp/intel-tail.log
          {
            echo 'Current Mac publisher:'
            echo '```json'
            cat /tmp/run.json
            echo '```'
            echo
            echo 'Intel failed-proof tail:'
            echo '```text'
            cat /tmp/intel-tail.log
            echo '```'
          } > /tmp/status.md
          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/issues/comments/5069780966" \
            -f "body=$(cat /tmp/status.md)"
