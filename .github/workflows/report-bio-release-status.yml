name: Report FigureLoom Bio release status

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/report-bio-release-status.yml'
  workflow_dispatch:

permissions:
  actions: read
  issues: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Verify published Mac release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag='figureloom-bio-macos-installer'
          gh release view "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --json tagName,name,isLatest,url,assets \
            > /tmp/release.json

          jq -e '.assets | map(.name) | index("FigureLoom-Bio-Installer-macOS-Apple-Silicon.pkg") != null' /tmp/release.json >/dev/null
          jq -e '.assets | map(.name) | index("FigureLoom-Bio-Installer-macOS-Intel.pkg") != null' /tmp/release.json >/dev/null
          jq -e '.assets[] | select(.name == "FigureLoom-Bio-Installer-macOS-Apple-Silicon.pkg") | .size > 0' /tmp/release.json >/dev/null
          jq -e '.assets[] | select(.name == "FigureLoom-Bio-Installer-macOS-Intel.pkg") | .size > 0' /tmp/release.json >/dev/null

          {
            echo 'Published FigureLoom Bio macOS release:'
            echo '```json'
            cat /tmp/release.json
            echo '```'
          } > /tmp/status.md
          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/issues/comments/5069780966" \
            -f "body=$(cat /tmp/status.md)"
