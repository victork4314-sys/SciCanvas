name: Report FigureLoom Bio release status

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/report-bio-release-status.yml'
  workflow_dispatch:

permissions:
  actions: write
  issues: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Keep only newest Mac publisher and report it
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow publish-fixed-macos-installers.yml \
            --branch main \
            --limit 20 \
            --json databaseId,status,conclusion,headSha,event,number,createdAt,updatedAt,url \
            > /tmp/runs.json

          newest="$(jq -r '.[0].databaseId // empty' /tmp/runs.json)"
          test -n "$newest"

          jq -r --arg newest "$newest" \
            '.[] | select((.status == "queued" or .status == "in_progress" or .status == "pending" or .status == "waiting") and (.databaseId|tostring) != $newest) | .databaseId' \
            /tmp/runs.json \
          | while read -r run_id; do
              [[ -n "$run_id" ]] || continue
              echo "Cancelling superseded Mac publisher $run_id"
              gh run cancel "$run_id" --repo "$GITHUB_REPOSITORY" || true
            done

          sleep 5
          gh run view "$newest" \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId,status,conclusion,headSha,createdAt,updatedAt,url,jobs \
            > /tmp/newest.json
          {
            echo 'Newest Mac publisher only:'
            echo '```json'
            cat /tmp/newest.json
            echo '```'
          } > /tmp/status.md
          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/issues/comments/5069780966" \
            -f "body=$(cat /tmp/status.md)"

# activate after correcting macOS post-install ownership
