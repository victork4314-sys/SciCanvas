name: Phone mode regression

on:
  pull_request:
    paths:
      - 'mobile-mode.js'
      - 'mobile-mode.css'
      - 'mobile-mode-canvas-fit.js'
      - 'mobile-tools-polish.js'
      - 'mobile-tools-scroll-fix.js'
      - 'mobile-toast-theme.js'
      - 'mobile-touch-drag-fix.js'
      - 'drawing-pad-fix.js'
      - 'desktop-history-actions.js'
      - 'inspector-consistency.js'
      - 'final-surface-polish.js'
      - 'collaboration-status-fix.js'
      - 'editable-svg-original-color-fix.js'
      - 'adriana-polish.js'
      - 'tour-mobile-safe.js'
      - 'settings-core.js'
      - 'settings-page.js'
      - 'navigation-clarity.js'
      - 'profile-picture-plus.js'
      - 'collaboration-avatar-presence.js'
      - 'data-inline-feedback.js'
      - 'safe-refresh.js'
      - 'pptx-export-rebuilt.js'
      - 'recovery-layout-fixes.js'
      - 'service-worker.js'
      - 'README.md'
      - 'wiki/Home.md'
      - 'tests/adriana-polish.spec.js'
      - 'tests/drawing-pad.spec.js'
      - 'tests/mobile-tools-polish.spec.js'
      - 'tests/clarity-profile-data.spec.js'
      - 'tests/desktop-history-actions.spec.js'
      - 'tests/inspector-consistency.spec.js'
      - 'tests/final-dark-collab-polish.spec.js'
      - 'tests/phone-mode.spec.js'
      - 'tests/phone-polish.spec.js'
      - 'tests/phone-zoom-frame.spec.js'
      - 'tests/pptx-export-rebuilt.spec.js'
      - 'playwright.config.js'
      - '.github/workflows/phone-mode.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phone-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Check phone JavaScript syntax
        run: |
          node --check mobile-mode.js
          node --check mobile-mode-canvas-fit.js
          node --check mobile-tools-polish.js
          node --check mobile-tools-scroll-fix.js
          node --check mobile-toast-theme.js
          node --check mobile-touch-drag-fix.js
          node --check drawing-pad-fix.js
          node --check desktop-history-actions.js
          node --check inspector-consistency.js
          node --check final-surface-polish.js
          node --check collaboration-status-fix.js
          node --check editable-svg-original-color-fix.js
          node --check adriana-polish.js
          node --check tour-mobile-safe.js
          node --check navigation-clarity.js
          node --check profile-picture-plus.js
          node --check collaboration-avatar-presence.js
          node --check data-inline-feedback.js
          node --check safe-refresh.js
          node --check pptx-export-rebuilt.js
          node --check recovery-layout-fixes.js
          node --check service-worker.js
          node --check tests/adriana-polish.spec.js
          node --check tests/drawing-pad.spec.js
          node --check tests/mobile-tools-polish.spec.js
          node --check tests/clarity-profile-data.spec.js
          node --check tests/desktop-history-actions.spec.js
          node --check tests/inspector-consistency.spec.js
          node --check tests/final-dark-collab-polish.spec.js
          node --check tests/phone-mode.spec.js
          node --check tests/phone-polish.spec.js
          node --check tests/phone-zoom-frame.spec.js
          node --check tests/pptx-export-rebuilt.spec.js
      - name: Install test dependencies
        run: npm install --no-audit --no-fund
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run phone mode regressions
        run: npx playwright test tests/adriana-polish.spec.js tests/drawing-pad.spec.js tests/mobile-tools-polish.spec.js tests/clarity-profile-data.spec.js tests/desktop-history-actions.spec.js tests/inspector-consistency.spec.js tests/final-dark-collab-polish.spec.js tests/phone-mode.spec.js tests/phone-polish.spec.js tests/phone-zoom-frame.spec.js tests/pptx-export-rebuilt.spec.js
      - name: Upload phone test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: phone-mode-results
          path: test-results
          if-no-files-found: warn