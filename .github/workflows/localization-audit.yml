name: Localization audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  models: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Extract interface strings
        run: node scripts/localization-audit.mjs
      - name: Generate contextual translations
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOCALIZATION_MODEL: openai/gpt-4.1-mini
        run: node scripts/generate-localizations.mjs
      - name: Build exact language pack
        if: success()
        run: |
          node scripts/build-language-pack.mjs
          node --check language-complete-pack.js
      - name: Upload localization work
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: complete-interface-localization
          path: |
            interface-string-inventory.json
            complete-interface-translations.json
            complete-interface-translations.partial.json
            language-complete-pack.js
          if-no-files-found: warn
