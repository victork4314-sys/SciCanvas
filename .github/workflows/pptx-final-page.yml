name: Isolated all-pages exporter

on:
  pull_request:
    paths:
      - 'export-tools.js'
      - 'pptx-export.js'
      - 'pptx-export-rebuilt.js'
      - 'safe-refresh.js'
      - 'tests/pptx-final-page.spec.js'
      - '.github/workflows/pptx-final-page.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  isolated-multi-page-export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Check exporter and test syntax
        run: |
          node --check export-tools.js
          node --check pptx-export.js
          node --check pptx-export-rebuilt.js
          node --check tests/pptx-final-page.spec.js
      - name: Install test dependencies
        run: npm install --no-audit --no-fund
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify unique three-page and six-page exports
        run: npx playwright test tests/pptx-final-page.spec.js --project=desktop
      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: isolated-all-pages-export-results
          path: test-results
          if-no-files-found: warn
