# Deploy the dependency-free FigureLoom app to GitHub Pages.
name: Deploy FigureLoom to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate cross-platform icons
        run: python3 scripts/generate-platform-icons.py

      - name: Verify generated icon files
        run: |
          test -s favicon.ico
          test -s figureloom-icon-32-v1.png
          test -s figureloom-apple-touch-180-v1.png
          test -s figureloom-app-192-v1.png
          test -s figureloom-app-512-v1.png
          test -s mstile-150x150-v1.png
          test -s mstile-310x310-v1.png

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
