name: Install uploaded favicon

on:
  push:
    branches: [agent/install-uploaded-favicon-package]
    paths: [.github/workflows/install-real-favicon.yml]

permissions:
  contents: write

jobs:
  install:
    if: github.event.head_commit.message != 'Install uploaded favicon.ico'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/install-uploaded-favicon-package
          fetch-depth: 0
      - name: Install exact uploaded favicon
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/blobs/67bc1b4a1868f78dad681a642fd3c17493334766" \
            | jq -r .content | tr -d '\n' | base64 -d > favicon.ico
          python - <<'PY'
          from pathlib import Path
          import re

          for file in ['index.html', 'legal.html', 'wiki/index.html']:
              path = Path(file)
              if not path.exists():
                  continue
              text = path.read_text()
              text = re.sub(r'\s*<link\s+rel=["\'](?:shortcut )?icon["\'][^>]*>\s*', '\n', text, flags=re.I)
              text = re.sub(r'\s*<link\s+rel=["\']manifest["\'][^>]*>\s*', '\n', text, flags=re.I)
              text = text.replace('  <title>', '  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />\n  <title>', 1)
              path.write_text(text)

          ai = Path('ai-chat-fixes.js')
          text = ai.read_text()
          text = re.sub(r'\n\s*document\.head\.querySelectorAll\([^;]+?document\.head\.appendChild\(favicon\);\n', '\n', text, flags=re.S)
          text = text.replace('__figureLoomUnifiedAiChatFixesV12', '__figureLoomUnifiedAiChatFixesV13', 1)
          text = text.replace('window.__figureLoomUnifiedAiChatFixesV12 = true;', 'window.__figureLoomUnifiedAiChatFixesV13 = true;\n  window.__figureLoomUnifiedAiChatFixesV12 = true;', 1)
          ai.write_text(text)

          sw = Path('service-worker.js')
          text = sw.read_text()
          text = re.sub(r'stable-71d36df-locked-20260719-v\d+', 'stable-71d36df-locked-20260719-v53', text, count=1)
          text = text.replace('cache.add(new Request("./figureloom-favicon.svg", { cache:"reload" })),', 'cache.add(new Request("./favicon.ico", { cache:"reload" })),')
          if './favicon.ico' not in text:
              text = text.replace('cache.add(new Request("./figureloom-mark.svg", { cache:"reload" })),', 'cache.add(new Request("./favicon.ico", { cache:"reload" })),\n      cache.add(new Request("./figureloom-mark.svg", { cache:"reload" })),')
          sw.write_text(text)

          Path('.github/workflows/install-real-favicon.yml').unlink()
          PY
      - name: Commit installed favicon
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Install uploaded favicon.ico"
          git push origin HEAD:agent/install-uploaded-favicon-package
