name: Sync repository wiki

on:
  push:
    branches: [main]
    paths:
      - 'wiki/*.md'
      - '.github/workflows/sync-wiki.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: figureloom-wiki-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout manual source
        uses: actions/checkout@v7

      - name: Clone the GitHub wiki
        env:
          WIKI_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.wiki.git
        run: git clone "$WIKI_URL" .wiki-repository

      - name: Copy the canonical Markdown pages
        run: |
          find .wiki-repository -maxdepth 1 -type f -name '*.md' -delete
          cp wiki/*.md .wiki-repository/

      - name: Publish changes when needed
        working-directory: .wiki-repository
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'The GitHub wiki is already synchronized.'
            exit 0
          fi
          git commit -m 'Sync manual pages from the FigureLoom repository'
          git push origin HEAD:master
