<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f4f7fb" />
  <meta name="description" content="SciCanvas scientific illustration workspace" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>SciCanvas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="titlebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">SC</div>
        <div>
          <strong>SciCanvas</strong>
          <span>Scientific illustration workspace</span>
        </div>
      </div>

      <div class="document-title">
        <input id="documentName" value="Untitled figure" aria-label="Document name" />
        <span id="saveStatus">Saved locally</span>
      </div>

      <div class="title-actions">
        <button id="undoButton" type="button" disabled>Undo</button>
        <button id="redoButton" type="button" disabled>Redo</button>
        <button id="exportButton" type="button">Export</button>
      </div>
    </header>

    <nav class="ribbon-tabs" aria-label="Editor ribbon">
      <button class="ribbon-tab active" data-tab="home" type="button">Home</button>
      <button class="ribbon-tab" data-tab="insert" type="button">Insert</button>
      <button class="ribbon-tab" data-tab="science" type="button">Science</button>
      <button class="ribbon-tab" data-tab="layout" type="button">Layout</button>
      <button class="ribbon-tab" data-tab="design" type="button">Design</button>
      <button class="ribbon-tab" data-tab="data" type="button">Data</button>
      <button class="ribbon-tab" data-tab="review" type="button">Review</button>
    </nav>

    <section class="ribbon" aria-label="Editor tools">
      <div class="tool-group">
        <span class="tool-group-label">Add</span>
        <button id="addTextButton" type="button">Text</button>
        <button id="addShapeButton" type="button">Shape</button>
        <button id="addArrowButton" type="button">Arrow</button>
      </div>

      <div class="tool-group">
        <span class="tool-group-label">Arrange</span>
        <button id="bringForwardButton" type="button">Forward</button>
        <button id="sendBackwardButton" type="button">Backward</button>
        <button id="deleteButton" type="button">Delete</button>
      </div>

      <div class="tool-group">
        <span class="tool-group-label">View</span>
        <label><input id="gridToggle" type="checkbox" checked /> Grid</label>
        <label><input id="snapToggle" type="checkbox" checked /> Snap</label>
        <button id="fitButton" type="button">Fit</button>
      </div>
    </section>

    <main class="workspace">
      <aside class="left-panel">
        <div class="panel-heading">
          <h2>Pages</h2>
          <button id="addPageButton" type="button" aria-label="Add page">+</button>
        </div>

        <button class="page-thumbnail active" type="button">
          <span class="page-number">1</span>
          <span class="mini-page"></span>
          <span>Figure 1</span>
        </button>

        <div class="panel-heading layers-heading">
          <h2>Layers</h2>
        </div>
        <div id="layersList" class="layers-list">
          <p class="empty-state">No objects yet.</p>
        </div>
      </aside>

      <section class="canvas-area" aria-label="Canvas workspace">
        <div class="canvas-toolbar">
          <button id="zoomOutButton" type="button" aria-label="Zoom out">−</button>
          <span id="zoomValue">100%</span>
          <button id="zoomInButton" type="button" aria-label="Zoom in">+</button>
        </div>

        <div class="canvas-stage" id="canvasStage">
          <svg id="canvas" viewBox="0 0 1200 750" role="img" aria-label="Scientific illustration canvas">
            <defs>
              <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e7ebf1" stroke-width="1" />
              </pattern>
              <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
                <rect width="100" height="100" fill="url(#smallGrid)" />
                <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#d4dae3" stroke-width="1.25" />
              </pattern>
            </defs>
            <rect id="canvasBackground" width="1200" height="750" fill="white" />
            <rect id="gridLayer" width="1200" height="750" fill="url(#grid)" />
            <g id="objectLayer"></g>
            <g id="selectionLayer"></g>
          </svg>
        </div>
      </section>

      <aside class="right-panel">
        <div class="inspector-tabs" role="tablist">
          <button class="inspector-tab active" type="button">Format</button>
          <button class="inspector-tab" type="button">Science</button>
        </div>

        <section class="inspector-section">
          <h2>Selection</h2>
          <p id="selectionName">Nothing selected</p>
        </section>

        <section class="inspector-section">
          <h2>Position and size</h2>
          <div class="field-grid">
            <label>X <input id="positionX" type="number" disabled /></label>
            <label>Y <input id="positionY" type="number" disabled /></label>
            <label>W <input id="objectWidth" type="number" disabled /></label>
            <label>H <input id="objectHeight" type="number" disabled /></label>
          </div>
        </section>

        <section class="inspector-section">
          <h2>Appearance</h2>
          <label class="full-field">Fill <input id="fillColor" type="color" value="#6d7df2" disabled /></label>
          <label class="full-field">Stroke <input id="strokeColor" type="color" value="#26324a" disabled /></label>
          <label class="full-field">Opacity <input id="opacity" type="range" min="0" max="100" value="100" disabled /></label>
        </section>
      </aside>
    </main>

    <footer class="statusbar">
      <span>Page 1 of 1</span>
      <span id="objectCount">0 objects</span>
      <span>Local autosave enabled</span>
    </footer>
  </div>

  <script src="app.js"></script>
  <script src="science-library.js"></script>
  <script src="project-tools.js"></script>
  <script src="advanced-tools.js"></script>
  <script src="export-tools.js"></script>
  <script src="storage-vault.js"></script>
</body>
</html>
