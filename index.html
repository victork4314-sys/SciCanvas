  <style id="figureloomEarlyBootStyle">
    html[data-figureloom-stable-loading="1"] .app-shell{visibility:hidden!important}
    #figureloomStableBoot{position:fixed;inset:0;z-index:2147483647;display:grid;place-items:center;background:#f4f7f6;color:#172321;font:600 13px/1.4 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    #figureloomStableBoot>div{display:grid;justify-items:center;gap:10px;padding:20px}
    #figureloomStableBoot i{width:24px;height:24px;border:3px solid #cddbd7;border-top-color:#2f7468;border-radius:50%;animation:figureloomStableSpin .75s linear infinite}
    @keyframes figureloomStableSpin{to{transform:rotate(360deg)}}
    html[data-figureloom-theme="dark"] #figureloomStableBoot{background:#181d1c;color:#eef7f4}
    html[data-figureloom-theme="dark"] #figureloomStableBoot i{border-color:#43514d7border-top-color:#78c4b5}
  </style>
  <style id="figureloomNativeControlTheme">
    html[data-figureloom-theme] body :where(input[type="checkbox"],input[type="radio"],input[type="range"]){accent-color:var(--figureloom-ui-accent,#2f7468)!important}
    html[data-figureloom-theme] body input[type="range"]{-webkit-appearance:none;appearance:none;min-height:22px;padding:0;background:transparent!important}
    html[data-figureloom-theme] body input[type="range"]::-webkit-slider-runnable-track{height:5px;border:1px solid var(--figureloom-ui-line,#cddbd7);border-radius:999px;background:var(--figureloom-ui-strong,#dce9e5)}
    html[data-figureloom-theme] body input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:15px;height:15px;margin-top:-6px;border:2px solid var(--figureloom-ui-surface,#fff);border-radius:50%;background:var(--figureloom-ui-accent,#2f7468);box-shadow:0 0 0 1px var(--figureloom-ui-line,#cddbd7)}
    html[data-figureloom-theme] body input[type="range"]::-moz-range-track{height:5px;border:1px solid var(--figureloom-ui-line,#cddbd7;border-radius:999px;background:var(--figureloom-ui-strong,#dce9e5)}
    html[data-figureloom-theme] body input[type="range"]::-moz-range-progress{height:5px;border-radius:999px;background:var(--figureloom-ui-accent,#2f7468)}
    html[data-figureloom-theme] body input[type="range"]::-moz-range-thumb{width:13px;height:13px;border:2px solid var(--figureloom-ui-surface,#fff);border-radius:50%;background:var(--figureloom-ui-accent,#2f7468);box-shadow:0 0 0 1px var(--figureloom-ui-line,#cddbd7)}
    html[data-figureloom-theme] body input[type="range"]:disabled::-webkit-slider-thumb{background:var(--figureloom-ui-muted,#60706c);opacity:.72}
    html[data-figureloom-theme] body input[type="range"]:disabled::-moz-range-thumb{background:var(--figureloom-ui-muted,#60706c);opacity:.72}

    html[data-figureloom-theme] body #figureloomLayerManager{color:var(--figureloom-ui-text,#172321)!important;background:var(--figureloom-ui-surface,#fff)!mportant;border-color:var(--figureloom-ui-line,#cddbd7)!important;box-shadow:none!important}
    html[data-figureloom-theme] body #figureloomLayerManager :where(.layer-search-row input,#layerFilter,#layerTargetPage,.layer-inline-name){color:var(--figureloom-ui-text,#172321)!important;background:var(--figureloom-ui-surface,#fff)!mportant;border-color:var(--figureloom-ui-line,#cddbd7)!important}
    html[data-figureloom-theme] body #figureloomLayerManager .layer-search-row input::placeholder{color:var(--figureloom-ui-muted,#60706c)!important}
    html[data-figureloom-theme] body #figureloomLayerManager :where(.layer-search-row button,.layer-action-grid button,.layer-lock){color:var(--figureloom-ui-text,#172321)!important;background:var(--figureloom-ui-soft,#edf3f1)!important;border-color:var(--figureloom-ui-line,#cddbd7)!important;box-shadow:none!important}
    html[data-figureloom-theme] body #figureloomLayerManager :where(.layer-search-row button,.layer-action-grid button,.layer-lock):hover:not(:disabled){color:var(--figureloom-ui-accent-strong,#195c51)!important;background:var(--figureloom-ui-accent-soft,#dff1ec)!important;border-color:var(--figureloom-ui-accent,#2f7468)!important}
    html[data-figureloom-theme] body #figureloomLayerManager :where(.layer-manager-status,.layer-manager-actions summary,.layer-page-target,.layer-type){color:var(--figureloom-ui-muted,#60706c)!important}
    html[data-figureloom-theme] body #figureloomLayerManager .layer-manager-actions{border-color:var(--figureloom-ui-line,#cddbd7)!important}
    html[data-figureloom-theme] body #figureloomLayerManager .layer-group-mark{color:var(--figureloom-ui-accent-strong,#195c51)!important;background:var(--figureloom-ui-accent-soft,#dff1ec)!important;border-color:var(--figureloom-ui-accent,#2f7468)!important}
  </style>

er" disabled /></label><label>W <input id="objectWidth" type="number" disabled /></label><label>H <input id="objectHeight" type="number" disabled /></label></div></section><section class="inspector-section"><h2>Colors</h2><label class="full-field">Fill <input id="fillColor" type="color" value="#6d7df2" disabled /></label><label class="full-field">Outline <input id="strokeColor" type="color" value="#26324a" disabled /></label><label class="full-field">Opacity <input id="opacity" type="range" min="0" max="100" value="100" disabled /></label></section></aside></main>
